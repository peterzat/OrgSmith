name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to commit SHAs (mutable tags are a supply-chain risk).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: System deps (Pango for WeasyPrint)
        run: sudo apt-get update && sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0
      - name: Python deps
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements-dev.txt
      - name: Tests (short + unit + org)
        run: bin/test
      - name: Flagship tier (the large M12 pilot org, on its own)
        run: bin/test flagship
